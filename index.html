<!DOCTYPE html> <!-- serve para indicar a programação utilizada -->
<html lang="pt-br"> <!--abertura que delimita o documento, todas as tags devem ficar dentro desse espaço.-->
<head> <!-- define o cabeçalho do documento, as informações colocadas dentro dessse limite, não aparecem no navegador, mas contém instruções sobre seu conteúdo. Dentro desse teg podemos colocar folhas de estilo e script.-->
    <meta charset="UTF-8"> <!-- especifica qual conjunto de carcteres (character set ou charset) será usado para renderizar (converter o código em um arqui) o texto da página.-->
    <meta name="viewport" content="width=device-width, initial-scale=1.0"> <!-- fornece os matadados sobre a sua página.-->
    <title>Portfólio</title> <!-- é o titulo do seu documento.-->
</head> <!-- fechamento de tag do cabeçalho.-->
<body> <!-- abertura da tag, marcando o espaço no qual deve estar contido o conteúdo principal da página. As demais tags que represantam texto, botões, etc. devem ser adicionadas nesse intervalo.-->
    
</body> <!-- fechamento da tag do projeto.-->
</html> <!-- fechamento do documento -->
